<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Space Status</title>
    <meta name="description" content="">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <script>
    (function() {
        var m = window.matchMedia('(prefers-color-scheme: dark)');
        function apply(e) {
            document.documentElement.setAttribute(
                'data-bs-theme', e.matches ? 'dark' : 'light'
            );
        }
        apply(m);
        m.addEventListener('change', apply);
    })();
    </script>
    <link href="../assets/styles/bootstrap.min.css" rel="stylesheet">
    <link href="../assets/styles/basics.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-sm bg-body-tertiary border-bottom mb-5">
    <div class="container-fluid">
        <a href="//mainframe.io" class="navbar-brand">
            <img src="../assets/images/top_logo.png" alt="Mainframe"/>
        </a>
        <button class="navbar-toggler" type="button"
                onclick="document.getElementById('navbar-main').classList.toggle('show')">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbar-main">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link" href="/">Status</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/openStats">Öffnungsstatistiken</a>
                </li>
            </ul>
            <ul id="inprintLink" class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="//www.kreativitaet-trifft-technik.de/impressum.html">Impressum</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container page-switch">

    <h1>Switch</h1>

    <form class="d-flex flex-column gap-3" action="" method="post">

    {{if .showPwField}}
        <div class="mb-3">
            <label for="pw">Password</label>
            <div class="pw-input">
                <input type="password" class="form-control" name="password" id="pw" placeholder="Password"
                       value="{{ .password }}">
                <button class="btn btn-secondary btn-link" onclick="pwToUrl(); return false">Als URL</button>
            </div>
        </div>
    {{end}}

        <h2>Space</h2>

        <div>
            <button type="submit" class="btn btn-success" name="action" value="open">Öffnen!</button>
            <button type="submit" class="btn btn-danger" name="action" value="close">Schließen!</button>
        </div>
    </form>

</div>

<footer class="footer">
    <div class="container">
        Mainframe Spacestatus - <a href="//github.com/ktt-ol/spacestatus2">github.com/ktt-ol/spacestatus2</a>
    </div>
</footer>

<script>
    function pwToUrl() {
        location.search = "?password=" + document.getElementById("pw").value;
    }
</script>

</body>
</html>
